name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pytest pyyaml

      - name: Contract tests
        run: python -m pytest tests/test_agent_contract.py -v --tb=short

      - name: Tool budget check
        run: python scripts/check_tool_budget.py
